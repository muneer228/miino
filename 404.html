<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>404 — Miino</title>
  <meta name="robots" content="noindex" />
  <style>
    :root{--bg:#08111e;--card:#0d1a2d;--text:#ecf4ff;--muted:#a8b8d0;--accent:#71d0ff;--accent2:#9b8cff}
    *{box-sizing:border-box}body{margin:0;font-family:Inter,system-ui,sans-serif;background:radial-gradient(circle at top left, rgba(113,208,255,.16), transparent 30%),radial-gradient(circle at top right, rgba(155,140,255,.16), transparent 28%),linear-gradient(180deg,#08111e 0%,#091524 42%,#060d17 100%);color:var(--text);min-height:100vh;display:grid;place-items:center;padding:24px}
    .card{max-width:640px;width:100%;padding:32px;border-radius:24px;background:rgba(10,20,38,.72);border:1px solid rgba(255,255,255,.12);box-shadow:0 24px 80px rgba(0,0,0,.35)}
    .spark{font-size:42px;line-height:1;margin-bottom:12px}.k{color:var(--muted);line-height:1.75}.btn{display:inline-block;margin-top:18px;padding:12px 18px;border-radius:999px;color:var(--text);text-decoration:none;border:1px solid rgba(113,208,255,.38);background:linear-gradient(135deg, rgba(113,208,255,.18), rgba(155,140,255,.18))}
  </style>
</head>
<body>
  <main class="card">
    <div class="spark">✨</div>
    <h1>Page not found</h1>
    <p class="k">That page does not exist here, or it has moved.</p>
    <a class="btn" href="/">Back to miino.xyz</a>
  </main>
</body>
</html>
